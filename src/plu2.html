<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kiire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="output-plu2.css" rel="stylesheet">

<body>
    <section class="tw-bg-kiire-white tw-py-12 lg:tw-py-20">

                <div class="tw-flex tw-flex-col tw-gap-6">

                    <h1 class="tw-font-bricolage-grotesque tw-text-5xl tw-font-bold tw-text-kiire-text">

                    <p class="tw-font-sora tw-text-lg tw-text-kiire-text">

                    </p>

                    <div>
                        <a href="#"

                        </a>

                </div>

                <div class="tw-w-full">

                        class="tw-bg-kiire-purple tw-rounded-2xl tw-aspect-[3/4] tw-flex tw-items-center tw-justify-center tw-text-kiire-text tw-font-sora tw-text-xl">
                        Imagen 1
                    </div>
                </div>

                <div class="tw-w-full">
                    <div
                        class="tw-bg-kiire-lime-200 tw-rounded-2xl tw-aspect-[3/4] tw-flex tw-items-center tw-justify-center tw-text-kiire-text tw-font-sora tw-text-xl">
